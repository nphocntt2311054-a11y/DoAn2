<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang Quản Trị - Online Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* Thêm một chút style cho tab active */
        .tab-btn.active {
            border-bottom-color: #059669;
            /* emerald-600 */
            color: #059669;
        }
    </style>
</head>
<script src="admin.js"></script>

<body class="bg-gray-100 font-sans">

    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">

            <div class="flex items-center gap-4">
                <a href="trangchu.html">
                    <img src="image/logo.png" alt="Logo BookNè" width="100" height="auto" />
                </a>
                <div class="h-6 w-px bg-gray-300 hidden md:block"></div>
                <h1 class="text-xl font-bold text-emerald-600 hidden md:block">HỆ THỐNG QUẢN TRỊ</h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div
                        class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold border border-emerald-200">

                        <span id="admin-username" class="font-semibold text-gray-700">Admin</span>
                    </div>
                </div>
                <button id="logout-btn"
                    class="text-sm text-red-500 hover:text-red-700 font-semibold hover:underline border border-red-100 hover:bg-red-50 px-3 py-1 rounded transition">
                    Đăng xuất
                </button>
            </div>

        </div>
    </header>

    <main class="container mx-auto px-4 sm:px-6 lg:px-8 py-12">

        <div class="mb-8 border-b border-gray-300">
            <nav class="flex -mb-px space-x-8">
                <button id="tab-books"
                    class="tab-btn active whitespace-nowrap pb-4 px-1 border-b-2 font-semibold text-lg">
                    Quản lý Sách
                </button>
                <button id="tab-users"
                    class="tab-btn whitespace-nowrap pb-4 px-1 border-b-2 font-semibold text-lg text-gray-500 hover:text-gray-700">
                    Quản lý User
                </button>
                <button id="tab-orders"
                    class="tab-btn whitespace-nowrap pb-4 px-1 border-b-2 font-semibold text-lg text-gray-500 hover:text-gray-700">
                    Quản lý Đơn hàng
                </button>
            </nav>
        </div>

        <div id="content-books" class="tab-content grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Thêm Sách Mới</h2>
                <form id="add-book-form">
                    <div class="mb-4">
                        <label for="title" class="block text-gray-700 font-semibold mb-2">Tên sách</label>
                        <input type="text" id="title" class="w-full py-2 px-4 border border-gray-300 rounded-lg"
                            required />
                    </div>
                    <div class="mb-4">
                        <label for="author" class="block text-gray-700 font-semibold mb-2">Tác giả</label>
                        <input type="text" id="author" class="w-full py-2 px-4 border border-gray-300 rounded-lg"
                            required />
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Danh mục</label>

                        <select id="category" required
                            class="w-full px-4 py-2 border rounded-lg focus:ring-primary focus:border-primary bg-white">

                            <option value="" disabled selected>-- Chọn danh mục sách --</option>

                            <option value="3">Văn học</option>
                            <option value="2">Kinh tế</option>
                            <option value="1">Tâm lý & Kỹ năng sống</option>
                            <option value="4">Sách thiếu nhi</option>
                            <option value="6">Khoa học - Công nghệ</option>
                            <!-- <option value="7">Nuôi dạy con</option> -->
                            <option value="5">Sách Ngoại ngữ/AV</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Vị trí hiển thị ở trang chủ</label>
                        <select id="book-position"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-primary focus:border-primary bg-white">
                            <option value="new">Sản phẩm Mới </option>
                            <option value="featured">Sản phẩm Nổi bật</option>
                            <option value="suggested">Gợi ý dành cho bạn</option>
                            <option value="none">Chỉ hiện trong danh mục (Không hiện trang chủ)</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label for="price" class="block text-gray-700 font-semibold mb-2">Giá (VNĐ)</label>
                        <input type="number" id="price" class="w-full py-2 px-4 border border-gray-300 rounded-lg"
                            required />
                    </div>
                    <div class="mb-4">
                        <label for="stock" class="block text-gray-700 font-semibold mb-2">Số lượng tồn kho</label>
                        <input type="number" id="stock" class="w-full py-2 px-4 border border-gray-300 rounded-lg"
                            value="1" required />
                    </div>

                    <div class="mb-4">
                        <label for="price" class="block text-gray-700 font-semibold mb-2">Hình ảnh sách </label>

                        <div class="mb-3">
                            <span class="text-sm font-semibold text-gray-700 block mb-1">Tải ảnh từ máy
                                tính</span>
                            <input type="file" id="imageFile" accept="image/*"
                                class="w-full py-2 px-3 border border-gray-300 rounded-lg bg-white" />
                        </div>

                        <div class="text-center text-gray-500 text-sm font-bold mb-3">- HOẶC -</div>

                        <div>
                            <span class="text-sm font-semibold text-gray-700 block mb-1">Dán link ảnh
                                (URL)</span>
                            <input type="text" id="imageUrl"
                                class="w-full py-2 px-4 border border-gray-300 rounded-lg bg-white"
                                placeholder="Ví dụ: https://..." />
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="description" class="block text-gray-700 font-semibold mb-2">Mô tả</label>
                        <textarea id="description" rows="4"
                            class="w-full py-2 px-4 border border-gray-300 rounded-lg"></textarea>
                    </div>
                    <button type="submit"
                        class="w-full bg-emerald-600 text-white py-3 rounded-lg font-semibold text-lg hover:bg-emerald-700">
                        Thêm Sách
                    </button>
                    <p id="admin-message" class="text-center mt-4"></p>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Sách Hiện Có Trong CSDL</h2>
                <div id="book-list" class="space-y-4">
                    <p>Đang tải danh sách sách...</p>
                </div>
            </div>
        </div>

        <div id="content-users" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Quản lý Người dùng</h2>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white border border-gray-200 rounded-lg overflow-hidden">
                        <thead class="bg-gray-100 text-gray-700 font-bold uppercase text-sm">
                            <tr>
                                <th class="py-3 px-4 text-left border-b">ID</th>
                                <th class="py-3 px-4 text-left border-b">Tên đăng nhập</th>
                                <th class="py-3 px-4 text-center border-b">Vai trò</th>
                                <th class="py-3 px-4 text-center border-b">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="user-list-body" class="text-gray-600 text-sm">
                            <tr>
                                <td colspan="4" class="py-4 text-center">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="content-orders" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Danh sách Đơn hàng</h2>
                    <button onclick="loadOrders()" class="text-sm text-emerald-600 hover:underline font-bold">🔄 Làm
                        mới</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                        <thead class="bg-gray-100 text-gray-700 font-bold uppercase text-xs">
                            <tr>
                                <th class="py-3 px-4 text-left">Mã đơn</th>
                                <th class="py-3 px-4 text-left">Khách hàng</th>
                                <th class="py-3 px-4 text-left">Sản phẩm</th>
                                <th class="py-3 px-4 text-right">Tổng tiền</th>
                                <th class="py-3 px-4 text-center">Trạng thái</th>
                                <th class="py-3 px-4 text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="order-list-body" class="text-gray-600 text-sm divide-y divide-gray-200">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
