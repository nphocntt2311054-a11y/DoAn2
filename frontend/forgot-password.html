<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - BookNè</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 h-screen flex justify-center items-center">

    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 w-[400px] mx-4 transition-all">
        <h2 class="text-2xl font-bold text-center text-emerald-600 mb-2">Khôi phục mật khẩu</h2>

        <p id="message" class="text-center text-sm font-medium mb-4 hidden"></p>

        <div id="step-1">
            <p class="text-center text-gray-500 text-sm mb-6">Nhập email của bạn để nhận mã xác nhận (OTP).</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Địa chỉ Email</label>
                    <input type="email" id="email-input" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                        placeholder="vidu@gmail.com">
                </div>
                <button onclick="sendOTP()" id="btn-step-1"
                    class="w-full bg-emerald-600 text-white font-bold py-2.5 rounded-lg hover:bg-emerald-700 transition">
                    Gửi mã OTP
                </button>
            </div>
        </div>

        <div id="step-2" class="hidden">
            <div class="bg-emerald-50 text-emerald-700 p-3 rounded-lg text-sm mb-6 border border-emerald-100">
                Mã OTP đã được gửi đến email: <strong id="display-email"></strong>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Mã xác nhận (OTP)</label>
                    <input type="text" id="otp-input" required maxlength="6"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-center tracking-[0.5em] font-bold"
                        placeholder="------">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Mật khẩu mới</label>
                    <input type="password" id="new-password-input" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                        placeholder="Nhập mật khẩu mới">
                </div>
                <button onclick="resetPassword()" id="btn-step-2"
                    class="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg hover:bg-blue-700 transition">
                    Xác nhận đổi mật khẩu
                </button>
            </div>
        </div>

        <div class="text-center mt-6 pt-4 border-t border-gray-100">
            <a href="login.html" class="text-sm text-gray-500 hover:text-emerald-600 font-medium">Quay lại Đăng nhập</a>
        </div>
    </div>

    <script>
        const msgEl = document.getElementById('message');

        function showMessage(text, isSuccess) {
            msgEl.textContent = text;
            msgEl.className = `text-center text-sm font-medium mb-4 block ${isSuccess ? 'text-emerald-600' : 'text-red-500'}`;
        }

        // HÀM 1: GỌI API GỬI OTP
        async function sendOTP() {
            const email = document.getElementById('email-input').value;
            if (!email) return showMessage('Vui lòng nhập email!', false);

            const btn = document.getElementById('btn-step-1');
            btn.textContent = "Đang gửi..."; btn.disabled = true;

            try {
                const res = await fetch('http://127.0.0.1:3000/api/forgot-password-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const data = await res.json();

                if (data.success) {
                    // Ẩn bước 1, hiện bước 2
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    document.getElementById('display-email').textContent = email;
                    showMessage(data.message, true);
                } else {
                    showMessage(data.message, false);
                }
            } catch (err) {
                showMessage("Lỗi kết nối Server!", false);
            } finally {
                btn.textContent = "Gửi mã OTP"; btn.disabled = false;
            }
        }

        // HÀM 2: GỌI API ĐỔI MẬT KHẨU
        async function resetPassword() {
            const email = document.getElementById('email-input').value;
            const otp = document.getElementById('otp-input').value;
            const newPassword = document.getElementById('new-password-input').value;

            if (!otp || !newPassword) return showMessage('Vui lòng nhập đủ mã OTP và mật khẩu mới!', false);

            const btn = document.getElementById('btn-step-2');
            btn.textContent = "Đang xử lý..."; btn.disabled = true;

            try {
                const res = await fetch('http://127.0.0.1:3000/api/reset-password-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage("✅ Đổi mật khẩu thành công! Đang chuyển hướng...", true);
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showMessage(data.message, false);
                }
            } catch (err) {
                showMessage("Lỗi kết nối Server!", false);
            } finally {
                btn.textContent = "Xác nhận đổi mật khẩu"; btn.disabled = false;
            }
        }
    </script>
</body>

</html>
